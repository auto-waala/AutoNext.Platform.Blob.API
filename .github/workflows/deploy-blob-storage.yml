name: Deploy AutoNext.Platform.Blob.API to Dev and Production

on:
  pull_request:
    types: [closed]
    branches: [master, main]

jobs:
  # ==================== BUILD ONCE ====================
  build:
    if: github.event.pull_request.merged == true
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore AutoNext.Platform.Blob.API.csproj

      - name: Publish API for Development
        run: |
          dotnet publish AutoNext.Platform.Blob.API.csproj `
            --configuration Release `
            --output ./publish/dev `
            -p:EnvironmentName=Development

      - name: Publish API for Production
        run: |
          dotnet publish AutoNext.Platform.Blob.API.csproj `
            --configuration Release `
            --output ./publish/prod `
            -p:EnvironmentName=Production

      - name: Prepare Dev deployment package
        shell: bash
        run: |
          if [ ! -f "./publish/dev/web.config" ]; then
            cp ./web.config ./publish/dev/web.config
          fi
          echo "Deployed: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" > ./publish/dev/deployment-info.txt

      - name: Prepare Prod deployment package
        shell: bash
        run: |
          if [ ! -f "./publish/prod/web.config" ]; then
            cp ./web.config ./publish/prod/web.config
          fi
          echo "Deployed: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" > ./publish/prod/deployment-info.txt

      - name: Upload Dev artifact
        uses: actions/upload-artifact@v4
        with:
          name: publish-dev
          path: ./publish/dev/
          retention-days: 1

      - name: Upload Prod artifact
        uses: actions/upload-artifact@v4
        with:
          name: publish-prod
          path: ./publish/prod/
          retention-days: 1

  # ==================== DEPLOY TO DEVELOPMENT ====================
  deploy-dev:
    needs: build
    runs-on: windows-latest
    environment: Development

    steps:
      - name: Download Dev artifact
        uses: actions/download-artifact@v4
        with:
          name: publish-dev
          path: ./publish/dev/

      - name: Deploy to Dev via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./publish/dev/
          server-dir: ${{ secrets.FTP_DEV_PATH }}/
          port: 21
          timeout: 120000
          retry: 5
          retry-delay: 5000
          log: verbose
          state-name: .ftp-deploy-sync-state-dev.json
          exclude: |
            **/.git*
            **/.git*/**
            **/Logs/**
            **/wwwroot/uploads/**
            **/*.log
            **/*.ldf
            **/*.mdf

  # ==================== DEPLOY TO PRODUCTION ====================
  deploy-production:
    needs: deploy-dev
    runs-on: windows-latest
    environment: Production

    steps:
      - name: Download Prod artifact
        uses: actions/download-artifact@v4
        with:
          name: publish-prod
          path: ./publish/prod/

      - name: Deploy to Prod via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./publish/prod/
          server-dir: ${{ secrets.FTP_PROD_PATH }}/
          port: 21
          timeout: 120000
          retry: 5
          retry-delay: 5000
          log: verbose
          state-name: .ftp-deploy-sync-state-prod.json
          exclude: |
            **/.git*
            **/.git*/**
            **/Logs/**
            **/wwwroot/uploads/**
            **/*.log
            **/*.ldf
            **/*.mdf

      - name: Verify deployment
        shell: bash
        run: |
          echo "=========================================="
          echo "✅ DEPLOYMENT COMPLETED"
          echo "=========================================="
          echo "Environment : Production"
          echo "URL         : https://autonext-blob.services.azurewebsites.betalen.in"
          echo "Timestamp   : $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "Commit SHA  : ${{ github.sha }}"
          echo "PR Number   : #${{ github.event.pull_request.number }}"
          echo "=========================================="
